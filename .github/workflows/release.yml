name: Build obsidian plugin

permissions:
  contents: write

on:
  push:
    tags:
      - '*'
  pull_request:
    types:
      - closed # Trigger only when a PR is closed (merged)
    branches:
      - master

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
      - name: Build
        id: build
        run: |
          npm ci
          npm run build --if-present
          npm run dev-build --if-present
          cp manifest.json dist/
          cp styles.css dist/
          ls dist/
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            dist/styles.css \
            dist/main.js \
            dist/manifest.json

  beta-release:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.head_ref, 'beta/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
      - name: Create and push a tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
      - name: Build
        run: |
          npm ci
          npm run build --if-present
          cp manifest-beta.json dist/manifest.json
          cp styles.css dist/
          ls dist/
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "$VERSION" \
            --prerelease \
            --title="$VERSION" \
            --notes "Automated beta release for version $VERSION" \
            dist/main.js dist/styles.css dist/manifest.json
